name: Close Issue on Merge

on:
  pull_request:
    types: [closed]

jobs:
  close-issue:
    # PRがマージされた場合のみ実行（クローズされただけの場合はスキップ）
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    # Issueを書き換えるための権限を設定
    permissions:
      issues: write

    steps:
      - name: Extract Issue ID from branch name
        id: get_issue
        run: |
          # マージされたPRのソースブランチ名を取得 (例: issue/#123)
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Merged branch: $BRANCH_NAME"
          
          # 正規表現で「issue/#数字」の数字部分を抽出
          if [[ $BRANCH_NAME =~ issue/([0-9]+) ]]; then
            ISSUE_ID="${BASH_REMATCH[1]}"
            echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
            echo "Found Issue ID: $ISSUE_ID"
          else
            echo "No matching issue ID found in branch name."
          fi

      - name: Close Issue
        # 前のステップでIssue IDが見つかった場合のみ実行
        if: steps.get_issue.outputs.issue_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_ID: ${{ steps.get_issue.outputs.issue_id }}
        run: |
          echo "Closing Issue #$ISSUE_ID..."
          gh issue close "$ISSUE_ID" --reason "completed" --comment "Merged branch ${{ github.event.pull_request.head.ref }} and automatically closed this issue."