name: Close Issue on Merge

on:
  pull_request:
    types: [closed]

jobs:
  close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      # actions/checkout が内部でコードを読み取るために必要（読み取り専用）
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Issue ID from branch name
        id: get_issue
        env:
          RAW_BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Merged branch: $RAW_BRANCH_NAME"
          
          # 「issue/#数字」または「issue/数字」の両方に対応できるように正規表現を少し柔軟にしています
          if [[ $RAW_BRANCH_NAME =~ issue/([0-9]+) || $RAW_BRANCH_NAME =~ issue/\#([0-9]+) ]]; then
            ISSUE_ID="${BASH_REMATCH[1]}"
            echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
            echo "Found Issue ID: $ISSUE_ID"
          else
            echo "No matching issue ID found in branch name."
          fi

      - name: Close Issue
        if: steps.get_issue.outputs.issue_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_ID: ${{ steps.get_issue.outputs.issue_id }}
        run: |
          echo "Closing Issue #$ISSUE_ID..."
          gh issue close "$ISSUE_ID" --reason "completed" --comment "Merged branch ${{ github.event.pull_request.head.ref }} and automatically closed this issue."